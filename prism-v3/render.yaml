services:
  - type: web
    name: prism-v3
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.headless true --server.address 0.0.0.0
    envVars:
      - key: FMP_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
